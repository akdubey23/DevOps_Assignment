name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stage 1: Build & Lint - Compile and check for syntax errors
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build & Lint
        run: |
          python -m py_compile app.py
          python -c "import ast; ast.parse(open('app.py').read())"
          echo "Lint: No syntax errors found"

      # Stage 2: Docker Image Assembly
      - name: Build Docker image
        run: docker build -t flask-app:latest .

      # Stage 3: Automated Testing - Execute Pytest inside containerized environment
      - name: Run tests inside Docker container
        run: |
          docker run --rm flask-app:latest pytest test_app.py -v
